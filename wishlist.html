<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wishlist — Kamini by Safe &amp; Sure (India)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="wishlist">

<div id="site-header"></div>

<main class="wide">
  <section class="page-head">
    <div class="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Wishlist</div>
    <h1>Saved for <span class="italic">later.</span></h1>
    <p class="lede" style="margin-top:14px;" id="wish-summary">Your saved formulations live here.</p>
  </section>

  <div id="wishlist-root" style="padding:50px 0 120px;"></div>
</main>

<div id="site-footer"></div>

<script src="app.js"></script>
<script>
function renderWishlist() {
  const list = getWishlist();
  const root = document.getElementById('wishlist-root');
  const summary = document.getElementById('wish-summary');
  if (!list.length) {
    root.innerHTML = `
      <div class="wishlist-empty">
        <div style="font-family:var(--serif);font-size:88px;line-height:1;color:var(--mute);">♡</div>
        <h2 class="h-section serif" style="margin:20px 0 14px;">Nothing <span class="italic" style="color:var(--saffron);">saved yet.</span></h2>
        <p class="lede" style="margin:0 auto 30px;">Browse the eleven Kamini formulations and tap the ♡ to save items you'd like to return to.</p>
        <a class="btn btn-dark" href="shop.html">Shop all formulations →</a>
      </div>`;
    summary.textContent = 'Your wishlist is currently empty.';
    return;
  }
  const items = list.map(slug => findProduct(slug)).filter(Boolean);
  summary.textContent = `${items.length} formulation${items.length===1?'':'s'} saved.`;
  root.innerHTML = `<div class="product-grid">${items.map(productCardHTML).join('')}</div>`;
}
renderWishlist();
// Re-render after the user toggles
document.addEventListener('click', e => {
  if (e.target.closest('[data-fav-slug]')) setTimeout(renderWishlist, 50);
});
</script>
</body>
</html>
